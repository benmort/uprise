# ngrok tunnels for uprise local development — exposes the apps on dev.uprise.org.au.
#
#   pnpm dev:all      (terminal A — runs the four apps on localhost)
#   pnpm dev:tunnel   (terminal B — exposes them on the dev.uprise.org.au subdomains)
#
# Prerequisites (see docs/development/ngrok-dev.md):
#   - The uprise ngrok account must RESERVE these hostnames before they can be used
#     (else ERR_NGROK_319): dev.uprise.org.au plus the *.dev.uprise.org.au wildcard
#     (covers auth/app/api), each with a DNS CNAME in the uprise.org.au zone pointing
#     at the target ngrok shows on https://dashboard.ngrok.com/domains.
#   - Authtoken set once on this machine: `ngrok config add-authtoken <token>`
#     (NOT committed here — keep the secret in your local ngrok config).
version: "2"

tunnels:
  # Product marketing site → dev.uprise.org.au
  product-marketing:
    addr: 3003
    proto: http
    domain: dev.uprise.org.au

  # Auth / SSO identity app → auth.dev.uprise.org.au
  auth:
    addr: 3002
    proto: http
    domain: auth.dev.uprise.org.au

  # Organiser admin app → admin.dev.uprise.org.au (under the *.dev.uprise.org.au reservation)
  admin:
    addr: 3000
    proto: http
    domain: admin.dev.uprise.org.au

  # API → api.dev.uprise.org.au (frontend calls + provider webhooks)
  api:
    addr: 3001
    proto: http
    domain: api.dev.uprise.org.au

  # Canvasser field PWA → field.dev.uprise.org.au (under the *.dev.uprise.org.au reservation)
  field:
    addr: 3005
    proto: http
    domain: field.dev.uprise.org.au

  # Public action app → action.dev.uprise.org.au (under the *.dev.uprise.org.au reservation).
  # Where /volunteer/[campaignId] lands a freshly-joined volunteer, so the auth app's
  # NEXT_PUBLIC_ALLOWED_RETURN_ORIGINS must include this origin.
  action:
    addr: 3004
    proto: http
    domain: action.dev.uprise.org.au

  # Uprise Labs organisation site → labs.dev.uprise.org.au (under the *.dev.uprise.org.au
  # reservation; the real site ships to upriselabs.org at deploy)
  organisation-marketing:
    addr: 3006
    proto: http
    domain: labs.dev.uprise.org.au
