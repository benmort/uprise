name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      API_BASE_URL: http://localhost:3001
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/yarn_sms?schema=public
      BASIC_AUTH_USERNAME: ci-user
      BASIC_AUTH_PASSWORD: ci-password
      TWILIO_ACCOUNT_SID: AC00000000000000000000000000000000
      TWILIO_AUTH_TOKEN: token
      TWILIO_PHONE_NUMBER: +15550000000
      ACTION_NETWORK_API_KEY: test-key
      INTERNAL_SOURCE_API_BASE_URL: http://localhost:4000
      INTERNAL_SOURCE_API_KEY: test-key
      INTEGRATION_CREDENTIAL_SECRET: integration-secret
      CRON_SECRET: cron-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: API tests
        run: pnpm --filter api run test

      - name: Web tests
        run: pnpm --filter web run test

      - name: API build
        run: pnpm --filter api run build

      - name: Web build
        run: pnpm --filter web run build
