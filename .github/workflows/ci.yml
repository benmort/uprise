name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      API_BASE_URL: http://localhost:3001
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/uprise?schema=public
      BASIC_AUTH_USERNAME: ci-user
      BASIC_AUTH_PASSWORD: ci-password
      TWILIO_ACCOUNT_SID: AC00000000000000000000000000000000
      TWILIO_AUTH_TOKEN: token
      TWILIO_PHONE_NUMBER: +15550000000
      ACTION_NETWORK_API_KEY: test-key
      INTERNAL_SOURCE_API_BASE_URL: http://localhost:4000
      INTERNAL_SOURCE_API_KEY: test-key
      INTEGRATION_CREDENTIAL_SECRET: integration-secret
      CRON_SECRET: cron-secret
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the coverage gate can diff the PR against origin/main.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          # Match the repo's packageManager (pnpm@10.15.0) so --frozen-lockfile is honoured.
          version: 10.15.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      # Every package's suite (api jest + all vitest packages), not just api + admin.
      - name: Tests (all packages)
        run: pnpm run test

      # Patch floor (>=80% on changed lines) + no-regression ratchet, per CLAUDE.md rule 15.
      # On push to main the diff base equals HEAD, so nothing is checked; on PRs it gates the change.
      - name: Coverage gate (patch floor + ratchet)
        run: pnpm coverage:check

      - name: Build - api
        run: pnpm --filter api run build
      - name: Build - worker
        run: pnpm --filter worker run build
      - name: Build - admin
        run: pnpm --filter admin run build
      - name: Build - auth
        run: pnpm --filter auth run build
      - name: Build - action
        run: pnpm --filter action run build
      - name: Build - product-marketing
        run: pnpm --filter product-marketing run build
      - name: Build - organisation-marketing
        run: pnpm --filter organisation-marketing run build
